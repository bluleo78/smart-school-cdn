# 로컬 통합/홈 네트워크 테스트용 Docker Compose (이미지 빌드 포함)
# 표준 포트 사용 — LAN 상의 iPad·폰에서 직접 DNS/HTTP/HTTPS 접근 가능:
#   proxy      → 80 (HTTP), 443 (HTTPS)
#   dns-service → 53/udp
#   admin-web  → 7778 (관리 UI는 포트 지정 가능하므로 비표준 유지)
# 주의: 같은 호스트에 별도 prod 스택이 돌고 있으면 443·53 충돌 → prod 먼저 중단 필요
# CDN_IP 환경변수로 iPad가 받을 A 레코드값 지정:
#   CDN_IP=192.168.0.2 pnpm docker:up    # Mac의 LAN IP
# 사용법: pnpm docker:build && CDN_IP=<Mac-LAN-IP> pnpm docker:up
name: smart-school-cdn-local

services:
  storage-service:
    build:
      context: .
      dockerfile: services/storage-service/Dockerfile
    restart: unless-stopped
    volumes:
      - cache_data:/app/cache
    environment:
      - CACHE_DIR=/app/cache
      - CACHE_MAX_SIZE_GB=${CACHE_MAX_SIZE_GB:-5}
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cdn-local

  tls-service:
    build:
      context: .
      dockerfile: services/tls-service/Dockerfile
    restart: unless-stopped
    volumes:
      - certs_data:/app/certs
    environment:
      - CERTS_DIR=/app/certs
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cdn-local

  dns-service:
    build:
      context: .
      dockerfile: services/dns-service/Dockerfile
    restart: unless-stopped
    ports:
      - "53:53/udp"    # DNS 쿼리 (홈 네트워크 iPad/폰 직접 접근용)
    environment:
      - CDN_IP=${CDN_IP:-127.0.0.1}
      - DNS_UPSTREAM=${DNS_UPSTREAM:-8.8.8.8}
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cdn-local

  proxy:
    build:
      context: .
      dockerfile: services/proxy/Dockerfile
    restart: unless-stopped
    ports:
      - "80:8080"     # HTTP 프록시 (홈 네트워크 iPad/폰 직접 접근용)
      - "443:443"     # HTTPS 프록시 (홈 네트워크 iPad/폰 직접 접근용)
    environment:
      - STORAGE_GRPC_URL=http://storage-service:50051
      - TLS_GRPC_URL=http://tls-service:50052
      - RUST_LOG=info
    depends_on:
      storage-service:
        condition: service_healthy
      tls-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - cdn-local

  admin-server:
    build:
      context: .
      dockerfile: services/admin-server/Dockerfile
    restart: unless-stopped
    volumes:
      - admin_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4001
      - DB_PATH=/app/data/admin.db
      - PROXY_ADMIN_URL=http://proxy:8081
      - PROXY_HTTP_URL=http://proxy:8080
      - PROXY_HTTPS_URL=https://proxy:443
      - STORAGE_GRPC_URL=http://storage-service:50051
      - TLS_GRPC_URL=http://tls-service:50052
      - DNS_GRPC_URL=http://dns-service:50053
    depends_on:
      proxy:
        condition: service_healthy
      storage-service:
        condition: service_healthy
      tls-service:
        condition: service_healthy
      dns-service:
        condition: service_healthy
    networks:
      - cdn-local

  admin-web:
    build:
      context: .
      dockerfile: services/admin-web/Dockerfile
    restart: unless-stopped
    ports:
      - "7778:80"   # Admin UI (로컬 테스트 전용)
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin-server
    networks:
      - cdn-local

volumes:
  cache_data:
  certs_data:
  admin_data:

networks:
  cdn-local:
    driver: bridge
