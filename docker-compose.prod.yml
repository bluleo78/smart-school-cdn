# 로컬 통합 테스트용 Docker Compose (이미지 빌드 포함)
# prod와 포트 충돌 없도록 dev 전용 포트 사용:
#   proxy  → 8082 (HTTP), 4443 (HTTPS)
#   admin-web → 7778
# 사용법: pnpm docker:build && pnpm docker:up
name: smart-school-cdn-local

services:
  proxy:
    build:
      context: .
      dockerfile: services/proxy/Dockerfile
    restart: unless-stopped
    ports:
      - "8082:8080"   # HTTP 프록시 (로컬 테스트 전용)
      - "4443:443"    # HTTPS 프록시 (로컬 테스트 전용)
      - "5353:53/udp" # DNS 서버 (로컬 테스트 전용 — prod 53과 충돌 방지)
    volumes:
      - cache_data:/app/cache
      - certs_data:/app/certs
    environment:
      - CACHE_DIR=/app/cache
      - CACHE_MAX_SIZE_GB=${CACHE_MAX_SIZE_GB:-5}
      - CERTS_DIR=/app/certs
      - CDN_IP=${CDN_IP:-127.0.0.1}              # 로컬 테스트용 기본값
      - DNS_UPSTREAM=${DNS_UPSTREAM:-8.8.8.8}
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - cdn-local

  admin-server:
    build:
      context: .
      dockerfile: services/admin-server/Dockerfile
    restart: unless-stopped
    volumes:
      - admin_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4001
      - DB_PATH=/app/data/admin.db
      - PROXY_ADMIN_URL=http://proxy:8081
      - PROXY_HTTP_URL=http://proxy:8080
      - PROXY_HTTPS_URL=https://proxy:443
    depends_on:
      proxy:
        condition: service_healthy
    networks:
      - cdn-local

  admin-web:
    build:
      context: .
      dockerfile: services/admin-web/Dockerfile
    restart: unless-stopped
    ports:
      - "7778:80"   # Admin UI (로컬 테스트 전용)
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin-server
    networks:
      - cdn-local

volumes:
  cache_data:
  certs_data:
  admin_data:

networks:
  cdn-local:
    driver: bridge
