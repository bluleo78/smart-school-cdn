name: smart-school-cdn-prod

# ~/prod/smart-school-cdn/docker-compose.yml
# 운영 서버 런타임 — GHCR 이미지를 pull하여 실행한다.
#
# 디렉터리 구조:
#   ~/prod/smart-school-cdn/
#     docker-compose.yml   (이 파일)
#     nginx.conf           (admin-web 리버스 프록시 설정)
#     .env                 (환경 변수)
#     cache-data/          (프록시 캐시 — 자동 생성)
#     certs-data/          (CA 및 도메인 인증서 — 자동 생성)
#     admin-data/          (Admin SQLite DB — 자동 생성)

services:
  optimizer-service:
    image: ghcr.io/bluleo78/smart-school-cdn/optimizer-service:latest
    restart: unless-stopped
    volumes:
      - ./optimizer-data:/app/data
    environment:
      - OPTIMIZER_DB_PATH=/app/data/optimizer.db
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cdn-net

  storage-service:
    image: ghcr.io/bluleo78/smart-school-cdn/storage-service:latest
    restart: unless-stopped
    volumes:
      - ./cache-data:/app/cache
    environment:
      - CACHE_DIR=/app/cache
      - CACHE_MAX_SIZE_GB=${CACHE_MAX_SIZE_GB:-20}
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cdn-net

  tls-service:
    image: ghcr.io/bluleo78/smart-school-cdn/tls-service:latest
    restart: unless-stopped
    volumes:
      - ./certs-data:/app/certs
    environment:
      - CERTS_DIR=/app/certs
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cdn-net

  dns-service:
    image: ghcr.io/bluleo78/smart-school-cdn/dns-service:latest
    restart: unless-stopped
    ports:
      - "53:53/udp"    # DNS 쿼리
    environment:
      - CDN_IP=${CDN_IP}                          # 등록 도메인에 반환할 CDN 서버 IP
      - DNS_UPSTREAM=${DNS_UPSTREAM:-8.8.8.8}     # 미등록 도메인 포워딩 대상
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cdn-net

  proxy:
    image: ghcr.io/bluleo78/smart-school-cdn/proxy:latest
    restart: unless-stopped
    ports:
      - "8080:8080"   # HTTP 프록시 + CA 다운로드
      - "443:443"     # HTTPS 프록시
    environment:
      - STORAGE_GRPC_URL=http://storage-service:50051
      - TLS_GRPC_URL=http://tls-service:50052
      - OPTIMIZER_GRPC_URL=http://optimizer-service:50054
      - RUST_LOG=info
    depends_on:
      optimizer-service:
        condition: service_healthy
      storage-service:
        condition: service_healthy
      tls-service:
        condition: service_healthy
    networks:
      - cdn-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  admin-server:
    image: ghcr.io/bluleo78/smart-school-cdn/admin-server:latest
    restart: unless-stopped
    volumes:
      - ./admin-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - NODE_ENV=production
      - PORT=4001
      - DB_PATH=/app/data/admin.db
      - PROXY_ADMIN_URL=http://proxy:8081
      - PROXY_HTTP_URL=http://proxy:8080
      - PROXY_HTTPS_URL=https://proxy:443
      - STORAGE_GRPC_URL=http://storage-service:50051
      - TLS_GRPC_URL=http://tls-service:50052
      - DNS_GRPC_URL=http://dns-service:50053
      - OPTIMIZER_GRPC_URL=http://optimizer-service:50054
    depends_on:
      proxy:
        condition: service_healthy
      storage-service:
        condition: service_healthy
      tls-service:
        condition: service_healthy
      dns-service:
        condition: service_healthy
    networks:
      - cdn-net

  admin-web:
    image: ghcr.io/bluleo78/smart-school-cdn/admin-web:latest
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-7777}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin-server
    networks:
      - cdn-net

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9999:8080"
    networks:
      - cdn-net
    restart: unless-stopped

networks:
  cdn-net:
    driver: bridge
