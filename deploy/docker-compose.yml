name: smart-school-cdn-prod

# ~/prod/smart-school-cdn/docker-compose.yml
# 운영 서버 런타임 — GHCR 이미지를 pull하여 실행한다.
#
# 디렉터리 구조:
#   ~/prod/smart-school-cdn/
#     docker-compose.yml   (이 파일)
#     nginx.conf           (admin-web 리버스 프록시 설정)
#     .env                 (환경 변수)
#     cache-data/          (프록시 캐시 — 자동 생성)
#     certs-data/          (CA 및 도메인 인증서 — 자동 생성)
#     admin-data/          (Admin SQLite DB — 자동 생성)

services:
  proxy:
    image: ghcr.io/bluleo78/smart-school-cdn/proxy:latest
    restart: unless-stopped
    ports:
      - "8080:8080"   # HTTP 프록시 + CA 다운로드
      - "443:443"     # HTTPS 프록시
    volumes:
      - ./cache-data:/app/cache
      - ./certs-data:/app/certs
    environment:
      - CACHE_DIR=/app/cache
      - CACHE_MAX_SIZE_GB=${CACHE_MAX_SIZE_GB:-20}
      - CERTS_DIR=/app/certs
      - RUST_LOG=info
    networks:
      - cdn-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  admin-server:
    image: ghcr.io/bluleo78/smart-school-cdn/admin-server:latest
    restart: unless-stopped
    volumes:
      - ./admin-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4001
      - DB_PATH=/app/data/admin.db
      - PROXY_ADMIN_URL=http://proxy:8081
      - PROXY_HTTP_URL=http://proxy:8080
      - PROXY_HTTPS_URL=https://proxy:443
    depends_on:
      proxy:
        condition: service_healthy
    networks:
      - cdn-net

  admin-web:
    image: ghcr.io/bluleo78/smart-school-cdn/admin-web:latest
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-7777}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - admin-server
    networks:
      - cdn-net

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9998:8080"
    networks:
      - cdn-net
    restart: unless-stopped

networks:
  cdn-net:
    driver: bridge
