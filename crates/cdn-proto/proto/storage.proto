syntax = "proto3";
package cdn.storage;

service StorageService {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Purge(PurgeRequest) returns (PurgeResponse);
  rpc Stats(StatsRequest) returns (StatsResponse);
  rpc Popular(PopularRequest) returns (PopularResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message GetRequest  { string key = 1; }
message GetResponse {
  bool   hit          = 1;
  bytes  body         = 2;
  string content_type = 3;
}

message PutRequest {
  string key          = 1;
  string url          = 2;
  string domain       = 3;
  string content_type = 4;
  bytes  body         = 5;
  uint64 ttl_secs     = 6;
}
message PutResponse {}

message PurgeAll {}

message PurgeRequest {
  oneof target {
    string  url    = 1;
    string  domain = 2;
    PurgeAll all   = 3;
  }
}
message PurgeResponse {
  uint64 purged_files = 1;
  uint64 freed_bytes  = 2;
}

message StatsRequest {}
message StatsResponse {
  double hit_rate    = 1;
  uint64 total_bytes = 2;
  uint64 used_bytes  = 3;
  repeated DomainStat domain_stats = 4;
}
message DomainStat {
  string domain     = 1;
  uint64 size_bytes = 2;
  uint64 file_count = 3;
  double hit_rate   = 4;
}

message PopularRequest  { uint32 limit = 1; }
message PopularResponse { repeated PopularEntry entries = 1; }
message PopularEntry {
  string url        = 1;
  string domain     = 2;
  uint64 size_bytes = 3;
  uint64 hit_count  = 4;
}

message HealthRequest {}
message HealthResponse { bool online = 1; int64 latency_ms = 2; }
